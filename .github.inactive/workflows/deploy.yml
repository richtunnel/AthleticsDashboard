name: Build and Deploy to Droplet

on:
  push:
    branches: ["main"]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        # This bypasses the doctl auth glitch by piping the token directly to Docker
        run: echo ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} | docker login registry.digitalocean.com -u ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} --password-stdin

      - name: Build and Push
        run: |
          # Using 'runner' target exactly as defined in your Dockerfile
          docker build --target runner -t registry.digitalocean.com/opletics-app-registry/opletics-web:latest .
          docker push registry.digitalocean.com/opletics-app-registry/opletics-web:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Authenticate the droplet session
            doctl auth init --access-token ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
            doctl registry login --expiry-seconds 1200

            # Pull the new image from your registry
            docker pull registry.digitalocean.com/opletics-app-registry/opletics-web:latest

            # Remove old container if it exists
            docker stop opletics-web || true
            docker rm opletics-web || true

            # Start the container on port 3000
            docker run -d \
              --name opletics-web \
              --restart always \
              -p 3000:3000 \
              registry.digitalocean.com/opletics-app-registry/opletics-web:latest
