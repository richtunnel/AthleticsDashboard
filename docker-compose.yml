services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athletics-app
    image: rickstokes/athletics-app:latest
    restart: unless-stopped
    env_file:
      - ./.athletics.env

    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 1G
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET}
      SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      SPACES_BUCKET: ${SPACES_BUCKET}
      SPACES_REGION: ${SPACES_REGION}
      NODE_ENV: production
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - athletics-network
    volumes:
      - public-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  adminer:
    image: adminer:latest
    container_name: athletics-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - athletics-network
    environment:
      ADMINER_DEFAULT_SERVER: ${DATABASE_HOST}

networks:
  athletics-network:
    driver: bridge

volumes:
  public-uploads:
