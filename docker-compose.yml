services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athletics-app
    image: rickstokes/athletics-app:latest
    restart: unless-stopped
    env_file:
      - ./.athletics.env

    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 1G
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET}
      # S3 / DigitalOcean Spaces — exposed under BOTH naming conventions so
      # any code path (legacy DO_SPACES_* or short SPACES_*) resolves them.
      SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      SPACES_BUCKET: ${SPACES_BUCKET}
      SPACES_REGION: ${SPACES_REGION}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT}
      SPACES_CDN_URL: ${SPACES_CDN_URL}
      DO_SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      DO_SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      DO_SPACES_BUCKET: ${SPACES_BUCKET}
      DO_SPACES_REGION: ${SPACES_REGION}
      DO_SPACES_ENDPOINT: ${SPACES_ENDPOINT}
      DO_SPACES_CDN_URL: ${SPACES_CDN_URL}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      # Force IPv4 for outbound connections. Node 20 tries IPv6 first (Happy
      # Eyeballs / autoSelectFamily); on this host IPv6 has no working route,
      # so connections to Google OAuth fail with
      # "AggregateError at internalConnectMultiple" and Google sign-in breaks.
      NODE_OPTIONS: --no-network-family-autoselection
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - athletics-network
    volumes:
      - public-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    # Same image as the app, but runs the BullMQ worker process instead of Next.
    # Scale horizontally with: docker compose up -d --scale worker=3
    image: rickstokes/athletics-app:latest
    container_name: athletics-worker
    restart: unless-stopped
    env_file:
      - ./.athletics.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      SPACES_BUCKET: ${SPACES_BUCKET}
      SPACES_REGION: ${SPACES_REGION}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT}
      SPACES_CDN_URL: ${SPACES_CDN_URL}
      DO_SPACES_ACCESS_KEY: ${SPACES_ACCESS_KEY}
      DO_SPACES_SECRET_KEY: ${SPACES_SECRET_KEY}
      DO_SPACES_BUCKET: ${SPACES_BUCKET}
      DO_SPACES_REGION: ${SPACES_REGION}
      DO_SPACES_ENDPOINT: ${SPACES_ENDPOINT}
      DO_SPACES_CDN_URL: ${SPACES_CDN_URL}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      # Same IPv4 fix as the app — outbound calls (Stripe, Google, email) fail
      # otherwise on this host's broken IPv6 route.
      NODE_OPTIONS: --no-network-family-autoselection
    command: ["yarn", "worker"]
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    networks:
      - athletics-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: athletics-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - athletics-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: athletics-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - athletics-network
    environment:
      ADMINER_DEFAULT_SERVER: ${DATABASE_HOST}

networks:
  athletics-network:
    driver: bridge

volumes:
  public-uploads:
