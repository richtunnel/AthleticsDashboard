name: Build and Deploy to Droplet

on:
  push:
    branches: ["main"]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and Push
        run: |
          docker build --target production -t registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/my-app:latest .
          docker push registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/my-app:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Login to registry (only needed once, but safe to run)
            doctl registry login --expiry-seconds 1200

            # Pull the new image
            docker pull registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/my-app:latest

            # Stop and remove the old container (if it exists)
            docker stop my-app || true
            docker rm my-app || true

            # Run the new container
            # Add your -e ENV_VARS here or use an .env file
            docker run -d \
              --name my-app \
              --restart always \
              -p 3000:3000 \
              registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/my-app:latest
